name: Checks

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "lisp/**"
      - "test/**"
      - "tool/**"
      - Makefile
      - flake.lock
      - flake.nix
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "lisp/**"
      - "test/**"
      - "tool/**"
      - Makefile
      - flake.lock
      - flake.nix

permissions: {}

concurrency:
  group: emacs-proofread-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.check }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        check:
          - flake
          - test
          - byte-compilation
          - checkdoc

    steps:
      - name: Check out source
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.7
        with:
          github_access_token: ${{ github.token }}

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v7.0.2
        with:
          primary-key: >-
            emacs-proofread-nix-${{ runner.os }}-${{ matrix.check }}-${{
              hashFiles('**/*.nix', '**/flake.lock')
            }}
          restore-prefixes-first-match: |
            emacs-proofread-nix-${{ runner.os }}-${{ matrix.check }}-
            emacs-proofread-nix-${{ runner.os }}-
          save: >-
            ${{
              github.event_name == 'push' &&
              github.ref == 'refs/heads/main'
            }}

      - name: Run ${{ matrix.check }}
        env:
          CHECK: ${{ matrix.check }}
        run: |
          set -euo pipefail
          status=0
          run_check() {
            if ! "$@"; then
              status=1
            fi
          }

          case "$CHECK" in
            flake)
              run_check nix flake check --all-systems
              run_check nix fmt -- --fail-on-change
              run_check \
                nix develop .#release --command \
                  actionlint \
                  -ignore 'unexpected key "queue"' \
                  .github/workflows/*.yml
              ;;
            test)
              run_check nix run .#emacs30-run-proofread-tests
              run_check nix run .#emacs31-run-proofread-tests
              ;;
            byte-compilation)
              run_check nix run .#emacs30-byte-compile-proofread
              run_check nix run .#emacs31-byte-compile-proofread
              ;;
            checkdoc)
              run_check nix run .#emacs30-checkdoc-proofread
              run_check nix run .#emacs31-checkdoc-proofread
              run_check nix develop .#release --command make clean
              run_check \
                nix develop .#release --command \
                  make \
                    proofread-pkg \
                    proofread-autoloads \
                    proofread-compile \
                    proofread-popup-pkg \
                    proofread-popup-autoloads \
                    proofread-popup-compile
              ;;
            *)
              printf 'Unknown check: %s\n' "$CHECK" >&2
              status=1
              ;;
          esac

          exit "$status"
