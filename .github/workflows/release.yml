name: Release

on:
  push:
    tags:
      - "*-v*"

permissions: {}

concurrency:
  group: emacs-proofread-release
  cancel-in-progress: false
  queue: max

env:
  GITHUB_API_VERSION: "2026-03-10"
  RELEASE_BRANCH: releases
  UPSTREAM_REPOSITORY: brsvh/emacs-proofread

jobs:
  identify:
    name: Identify release
    if: >-
      github.repository == 'brsvh/emacs-proofread' &&
      github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: read

    outputs:
      release_package: ${{ steps.release.outputs.release_package }}
      release_version: ${{ steps.release.outputs.release_version }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.7
        with:
          github_access_token: ${{ github.token }}

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v7.0.2
        with:
          primary-key: >-
            emacs-proofread-nix-${{ runner.os }}-flake-${{
              hashFiles('**/*.nix', '**/flake.lock')
            }}
          restore-prefixes-first-match: |
            emacs-proofread-nix-${{ runner.os }}-flake-
            emacs-proofread-nix-${{ runner.os }}-
          save: false

      - name: Identify package release
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mapfile -t release_packages < <(
            nix develop .#release --command \
              make --silent release-packages
          )
          test "${#release_packages[@]}" -gt 0

          release_package=
          release_version=
          for candidate in "${release_packages[@]}"; do
            prefix="${candidate}-v"
            if [[ "$RELEASE_TAG" == "$prefix"* ]]; then
              version="${RELEASE_TAG#"$prefix"}"
              if [[ "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
                if test -n "$release_package"; then
                  printf 'Ambiguous release tag: %s\n' \
                    "$RELEASE_TAG" >&2
                  exit 1
                fi
                release_package="$candidate"
                release_version="$version"
              fi
            fi
          done

          if test -z "$release_package"; then
            printf 'Invalid package release tag: %s\n' \
              "$RELEASE_TAG" >&2
            exit 1
          fi

          {
            printf 'release_package=%s\n' "$release_package"
            printf 'release_version=%s\n' "$release_version"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release source
        shell: bash
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          git fetch --force --no-tags origin \
            refs/heads/main:refs/remotes/origin/main

          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          git merge-base --is-ancestor \
            "$RELEASE_SHA" refs/remotes/origin/main

  check:
    name: Verify / ${{ matrix.check }}
    needs: identify
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        check:
          - flake
          - test
          - byte-compilation
          - checkdoc

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.7
        with:
          github_access_token: ${{ github.token }}

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v7.0.2
        with:
          primary-key: >-
            emacs-proofread-nix-${{ runner.os }}-${{ matrix.check }}-${{
              hashFiles('**/*.nix', '**/flake.lock')
            }}
          restore-prefixes-first-match: |
            emacs-proofread-nix-${{ runner.os }}-${{ matrix.check }}-
            emacs-proofread-nix-${{ runner.os }}-
          save: false

      - name: Run ${{ matrix.check }}
        env:
          CHECK: ${{ matrix.check }}
          RELEASE_PACKAGE: ${{ needs.identify.outputs.release_package }}
        run: |
          set -euo pipefail
          status=0
          run_check() {
            if ! "$@"; then
              status=1
            fi
          }

          case "$CHECK" in
            flake)
              run_check nix flake check --all-systems
              run_check nix fmt -- --fail-on-change
              run_check \
                nix develop .#release --command \
                  actionlint \
                  -ignore 'unexpected key "queue"' \
                  .github/workflows/release.yml
              ;;
            test)
              run_check \
                nix run .#emacs30-run-proofread-tests -- \
                  "$RELEASE_PACKAGE"
              run_check \
                nix run .#emacs31-run-proofread-tests -- \
                  "$RELEASE_PACKAGE"
              ;;
            byte-compilation)
              run_check \
                nix run .#emacs30-byte-compile-proofread -- \
                  "$RELEASE_PACKAGE"
              run_check \
                nix run .#emacs31-byte-compile-proofread -- \
                  "$RELEASE_PACKAGE"
              ;;
            checkdoc)
              run_check \
                nix run .#emacs30-checkdoc-proofread -- \
                  "$RELEASE_PACKAGE"
              run_check \
                nix run .#emacs31-checkdoc-proofread -- \
                  "$RELEASE_PACKAGE"
              ;;
            *)
              printf 'Unknown check: %s\n' "$CHECK" >&2
              status=1
              ;;
          esac

          exit "$status"

  build:
    name: Build release
    needs:
      - identify
      - check
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    env:
      RELEASE_PACKAGE: ${{ needs.identify.outputs.release_package }}
      RELEASE_VERSION: ${{ needs.identify.outputs.release_version }}

    permissions:
      contents: read

    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.7
        with:
          github_access_token: ${{ github.token }}

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v7.0.2
        with:
          primary-key: >-
            emacs-proofread-nix-${{ runner.os }}-byte-compilation-${{
              hashFiles('**/*.nix', '**/flake.lock')
            }}
          restore-prefixes-first-match: |
            emacs-proofread-nix-${{ runner.os }}-byte-compilation-
            emacs-proofread-nix-${{ runner.os }}-
          save: false

      - name: Fetch release history
        shell: bash
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          git fetch --force --no-tags origin \
            "refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"

          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"

      - name: Read and verify release history
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p release-input
          release_ref="refs/remotes/origin/${RELEASE_BRANCH}"
          tag_pattern='^([a-z0-9][a-z0-9-]*-)?v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'

          git show "${release_ref}:manifest.json" \
            > release-input/latest-manifest.json

          nix develop .#release --command \
            proofread-release validate \
            release-input/latest-manifest.json

          ledger_tag="$(
            jq -r \
              'if .tag == null then empty else .tag end' \
              release-input/latest-manifest.json
          )"

          if test -n "$ledger_tag"; then
            if [[ ! "$ledger_tag" =~ $tag_pattern ]]; then
              printf 'Invalid ledger tag: %s\n' "$ledger_tag" >&2
              exit 1
            fi

            history_ref="${release_ref}:manifests/${ledger_tag}.json"
            git show "$history_ref" \
              > release-input/latest-history.json
            cmp \
              release-input/latest-manifest.json \
              release-input/latest-history.json

            gh api \
              -H "X-GitHub-Api-Version: ${GITHUB_API_VERSION}" \
              "repos/${GITHUB_REPOSITORY}/releases/tags/${ledger_tag}" \
              > release-input/previous-release.json
            jq -e \
              '.draft == false and .immutable == true' \
              release-input/previous-release.json

            mkdir release-input/previous-release-assets
            gh release download "$ledger_tag" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern manifest.json \
              --dir release-input/previous-release-assets
            cmp \
              release-input/latest-manifest.json \
              release-input/previous-release-assets/manifest.json
          fi

          current_ref="${release_ref}:manifests/${RELEASE_TAG}.json"
          if git cat-file -e "$current_ref" 2>/dev/null; then
            git show "$current_ref" \
              > release-input/current-history.json
            nix develop .#release --command \
              proofread-release validate \
              release-input/current-history.json

            test "$(jq -r '.tag' release-input/current-history.json)" \
              = "$RELEASE_TAG"

            if test "$ledger_tag" = "$RELEASE_TAG"; then
              cmp \
                release-input/latest-manifest.json \
                release-input/current-history.json
            else
              gh api \
                -H "X-GitHub-Api-Version: ${GITHUB_API_VERSION}" \
                "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" \
                > release-input/current-release.json
              jq -e \
                '.draft == false and .immutable == true' \
                release-input/current-release.json

              mkdir release-input/current-release-assets
              gh release download "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --pattern manifest.json \
                --dir release-input/current-release-assets
              cmp \
                release-input/current-history.json \
                release-input/current-release-assets/manifest.json
            fi

            cp \
              release-input/current-history.json \
              release-input/previous-manifest.json
          elif test "$ledger_tag" = "$RELEASE_TAG"; then
            printf 'Current release history is missing: %s\n' \
              "$RELEASE_TAG" >&2
            exit 1
          else
            cp \
              release-input/latest-manifest.json \
              release-input/previous-manifest.json
          fi

      - name: Build reproducible package archive
        shell: bash
        run: |
          set -euo pipefail

          nix develop .#release --command make clean
          nix develop .#release --command \
            make PACKAGE="$RELEASE_PACKAGE" release-package-archive

          archive="$(
            nix develop .#release --command \
              make --silent \
                PACKAGE="$RELEASE_PACKAGE" \
                release-package-artifact
          )"
          test -n "$archive"
          printf '%s\n' "$archive" \
            > release-input/target-archive-path
          nix develop .#release --command \
            sha256sum "$archive" \
            > release-input/archive-sha256

          nix develop .#release --command make clean
          nix develop .#release --command \
            make PACKAGE="$RELEASE_PACKAGE" release-package-archive
          nix develop .#release --command \
            sha256sum --check --strict \
            release-input/archive-sha256

      - name: Prepare and install release snapshot
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          api() {
            gh api \
              -H "X-GitHub-Api-Version: ${GITHUB_API_VERSION}" \
              "$@"
          }

          asset_digest_from_release() {
            local release_file=$1
            local name=$2
            local release_id
            local digest
            local assets_file

            digest="$(
              jq -r --arg name "$name" \
                '.assets[]? | select(.name == $name) | .digest // empty' \
                "$release_file"
            )"
            if test -z "$digest"; then
              release_id="$(jq -r '.id' "$release_file")"
              assets_file="$(mktemp)"
              api \
                "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" \
                > "$assets_file"
              digest="$(
                jq -r --arg name "$name" \
                  '.[] | select(.name == $name) | .digest // empty' \
                  "$assets_file"
              )"
              rm -f "$assets_file"
            fi
            if test -z "$digest"; then
              printf 'Missing GitHub digest for asset: %s\n' "$name" >&2
              exit 1
            fi
            printf '%s\n' "$digest"
          }

          verify_github_asset_digest() {
            local release_file=$1
            local name=$2
            local path=$3
            local expected
            local actual

            expected="sha256:$(sha256sum "$path" | cut -d ' ' -f 1)"
            actual="$(asset_digest_from_release "$release_file" "$name")"
            if test "$actual" != "$expected"; then
              printf 'GitHub digest mismatch for %s: %s != %s\n' \
                "$name" "$actual" "$expected" >&2
              exit 1
            fi
          }

          archive="$(cat release-input/target-archive-path)"
          nix develop .#release --command \
            proofread-release verification-packages \
            "$RELEASE_PACKAGE" \
            "$RELEASE_VERSION" \
            "$RELEASE_TAG" \
            release-input/previous-manifest.json \
            "$archive" \
            release-input/verification-packages.json

          mkdir -p release-input/verification-archives
          verification_archives=()
          mapfile -t verification_rows < <(
            jq -c '.[]' release-input/verification-packages.json
          )
          for row in "${verification_rows[@]}"; do
            name="$(jq -r '.name' <<<"$row")"
            package_tag="$(jq -r '.release_tag' <<<"$row")"
            asset="$(jq -r '.asset' <<<"$row")"
            sha256="$(jq -r '.sha256' <<<"$row")"
            package_release="release-input/${name}-release.json"

            api \
              "repos/${GITHUB_REPOSITORY}/releases/tags/${package_tag}" \
              > "$package_release"
            jq -e '.draft == false and .immutable == true' \
              "$package_release"

            gh release download "$package_tag" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$asset" \
              --dir release-input/verification-archives
            path="release-input/verification-archives/${asset}"
            test "$(sha256sum "$path" | cut -d ' ' -f 1)" = "$sha256"
            verify_github_asset_digest "$package_release" "$asset" "$path"
            verification_archives+=("$path")
          done

          nix develop .#release --command \
            proofread-release prepare-package \
            "$RELEASE_PACKAGE" \
            "$RELEASE_VERSION" \
            "$RELEASE_TAG" \
            "$RELEASE_SHA" \
            release-input/previous-manifest.json \
            release-handoff \
            "$archive" \
            "${verification_archives[@]}"

          nix build --no-link ".#${RELEASE_PACKAGE}"
          nix_version="$(nix eval --raw ".#${RELEASE_PACKAGE}.version")"
          nix develop .#release --command \
            proofread-release check-package-version \
            release-handoff/assets/manifest.json \
            "$RELEASE_PACKAGE" \
            "$nix_version"

          target_asset="$(
            jq -r '.asset' release-handoff/plan.json
          )"
          nix develop .#release --command \
            proofread-release verify-install \
            release-handoff/assets/manifest.json \
            "release-handoff/assets/${target_asset}" \
            "${verification_archives[@]}"

      - name: Upload verified handoff
        id: upload
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-handoff/
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    name: Publish release
    needs: build
    if: >-
      github.repository == 'brsvh/emacs-proofread' &&
      github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: write

    environment:
      name: release

    steps:
      - name: Download verified handoff
        uses: actions/download-artifact@v8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact_id }}
          path: release-handoff
          digest-mismatch: error

      - name: Validate verified handoff
        shell: bash
        env:
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          test -f release-handoff/plan.json
          test -f release-handoff/release-notes.md
          test -f release-handoff/expected-assets.txt
          test -f release-handoff/previous-manifest.json
          test -d release-handoff/assets

          jq -e \
            --arg tag "$RELEASE_TAG" \
            --arg commit "$RELEASE_SHA" \
            '(
              .schema == 2 and
              .tag == $tag and
              .commit == $commit and
              (.released_package | type == "string") and
              (.asset | type == "string")
            )' \
            release-handoff/plan.json

          sort --check release-handoff/expected-assets.txt
          test -z "$(
            sort release-handoff/expected-assets.txt \
              | uniq --repeated
          )"

          while IFS= read -r name; do
            if [[ ! "$name" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
              printf 'Unsafe release asset name: %s\n' "$name" >&2
              exit 1
            fi
          done < release-handoff/expected-assets.txt

          test -z "$(
            find release-handoff/assets \
              -mindepth 1 -maxdepth 1 ! -type f -print -quit
          )"
          find release-handoff/assets \
            -mindepth 1 -maxdepth 1 -type f -printf '%f\n' \
            | sort > release-handoff/actual-assets.txt
          cmp \
            release-handoff/expected-assets.txt \
            release-handoff/actual-assets.txt

      - name: Check immutable releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.IMMUTABLE_RELEASES_TOKEN }}
        run: |
          set -euo pipefail

          test -n "$GH_TOKEN"
          gh api \
            -H "X-GitHub-Api-Version: ${GITHUB_API_VERSION}" \
            "repos/${GITHUB_REPOSITORY}/immutable-releases" \
            | jq -e '.enabled == true'

      - name: Publish or resume immutable release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          api() {
            gh api \
              -H "X-GitHub-Api-Version: ${GITHUB_API_VERSION}" \
              "$@"
          }

          # An update without tag_name detaches a draft as untagged-*.
          # Recover only a unique Actions-owned placeholder.
          release_for_tag() {
            api --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              | jq --arg tag "$RELEASE_TAG" '
                  . as $pages |
                  [$pages[][] | select(.tag_name == $tag)] as $tagged |
                  if ($tagged | length) == 1 then
                    $tagged[0]
                  elif ($tagged | length) > 1 then
                    error("multiple releases found for tag")
                  else
                    [$pages[][] |
                     select(
                       .draft == true and
                       .immutable == false and
                       .published_at == null and
                       .name == $tag and
                       (.tag_name |
                        test("^untagged-[0-9a-f]+$")) and
                       .author.login == "github-actions[bot]" and
                       .author.id == 41898282 and
                       .author.type == "Bot"
                     )] as $untagged |
                    if ($untagged | length) == 1 then
                      $untagged[0]
                    elif ($untagged | length) == 0 then
                      null
                    else
                      error("multiple recoverable untagged drafts found")
                    end
                  end
                '
          }

          release_by_id() {
            local release_id=$1

            api "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          }

          release_tag_index_matches() {
            local release_id=$1
            local indexed_release
            local status

            indexed_release="$(mktemp)"
            if release_for_tag > "$indexed_release" \
              && jq -e \
                --arg tag "$RELEASE_TAG" \
                --argjson release_id "$release_id" \
                '.id == $release_id and .tag_name == $tag' \
                "$indexed_release" >/dev/null; then
              status=0
            else
              status=1
            fi
            rm -f "$indexed_release"
            return "$status"
          }

          verify_release_tag() {
            local tag_sha

            tag_sha="$(
              api "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}" \
                | jq -er '.sha'
            )"
            if test "$tag_sha" != "$RELEASE_SHA"; then
              printf 'Release tag moved: %s != %s\n' \
                "$tag_sha" "$RELEASE_SHA" >&2
              return 1
            fi
          }

          asset_digest_from_release() {
            local release_file=$1
            local name=$2
            local release_id
            local digest
            local assets_file

            digest="$(
              jq -r --arg name "$name" \
                '.assets[]? | select(.name == $name) | .digest // empty' \
                "$release_file"
            )"
            if test -z "$digest"; then
              release_id="$(jq -r '.id' "$release_file")"
              assets_file="$(mktemp)"
              api \
                "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" \
                > "$assets_file"
              digest="$(
                jq -r --arg name "$name" \
                  '.[] | select(.name == $name) | .digest // empty' \
                  "$assets_file"
              )"
              rm -f "$assets_file"
            fi
            if test -z "$digest"; then
              printf 'Missing GitHub digest for asset: %s\n' "$name" >&2
              exit 1
            fi
            printf '%s\n' "$digest"
          }

          verify_github_asset_digest() {
            local release_file=$1
            local name=$2
            local path=$3
            local expected
            local actual

            expected="sha256:$(sha256sum "$path" | cut -d ' ' -f 1)"
            actual="$(asset_digest_from_release "$release_file" "$name")"
            if test "$actual" != "$expected"; then
              printf 'GitHub digest mismatch for %s: %s != %s\n' \
                "$name" "$actual" "$expected" >&2
              exit 1
            fi
          }

          release_is_owned_draft() {
            local release_file=$1

            jq -e \
              --arg tag "$RELEASE_TAG" \
              --arg release_sha "$RELEASE_SHA" \
              --rawfile expected_assets \
                release-handoff/expected-assets.txt \
              --rawfile expected_body release-handoff/release-notes.md '
              def actions_bot:
                .login == "github-actions[bot]" and
                .id == 41898282 and
                .type == "Bot";
              def normalized_body:
                . as $draft_body |
                (capture(
                   "Repository snapshot `" + $tag +
                   "` at `(?<commit>[0-9a-f]{40})`\\."
                 ).commit) as $commit |
                ($draft_body | gsub($commit; $release_sha));
              ($expected_assets |
               split("\n") |
               map(select(length > 0))) as $expected_names |
              .draft == true and
              .immutable == false and
              .prerelease == false and
              .published_at == null and
              (.author | actions_bot) and
              (.tag_name == $tag or
               ((.tag_name | test("^untagged-[0-9a-f]+$")) and
                .name == $tag)) and
              (try ((.body | normalized_body) == $expected_body)
               catch false) and
              (.assets | type == "array") and
              (([.assets[]?.name] | length) ==
               ([.assets[]?.name] | unique | length)) and
              (.tag_name == $tag or
               all(.assets[]?; .state == "uploaded")) and
              all(.assets[]?;
                  (.uploader | actions_bot) and
                  (.name as $name |
                   ($expected_names | index($name)) != null))
            ' "$release_file" >/dev/null
          }

          release_metadata_matches() {
            local release_file=$1

            jq -e \
              --arg tag "$RELEASE_TAG" \
              --rawfile body release-handoff/release-notes.md \
              '(.tag_name == $tag and
                .name == $tag and
                .body == $body and
                .prerelease == false)' \
              "$release_file" >/dev/null
          }

          verify_release_metadata() {
            local release_file=$1

            if ! release_metadata_matches "$release_file"; then
              jq -r \
                --arg tag "$RELEASE_TAG" \
                --rawfile body release-handoff/release-notes.md '
                "Release metadata mismatch: " +
                "tag_name=\(.tag_name | @json), " +
                "name=\(.name | @json), " +
                "expected_tag=\($tag | @json), " +
                "body_matches=\(.body == $body), " +
                "prerelease=\(.prerelease)"
              ' "$release_file" >&2
              return 1
            fi
          }

          release_assets_match() {
            local release_file=$1
            local name
            local expected
            local actual

            while IFS= read -r name; do
              expected="sha256:$(
                sha256sum "release-handoff/assets/${name}" \
                  | cut -d ' ' -f 1
              )"
              actual="$(
                jq -r --arg name "$name" \
                  '[.assets[]? | select(.name == $name)] |
                   if length == 1 and .[0].state == "uploaded" then
                     .[0].digest // empty
                   else
                     empty
                   end' \
                  "$release_file"
              )"
              if test "$actual" != "$expected"; then
                return 1
              fi
            done < release-handoff/expected-assets.txt
          }

          release_json=release-handoff/release.json
          release_for_tag > "$release_json"
          if jq -e 'type == "object"' "$release_json" >/dev/null; then
            :
          else
            jq -n \
              --arg tag "$RELEASE_TAG" \
              --arg target "$RELEASE_SHA" \
              --rawfile body release-handoff/release-notes.md \
              '{
                tag_name: $tag,
                target_commitish: $target,
                name: $tag,
                body: $body,
                draft: true
              }' > release-handoff/create-release.json
            api --method POST \
              --input release-handoff/create-release.json \
              "repos/${GITHUB_REPOSITORY}/releases" \
              > "$release_json"
          fi

          # A new draft may not appear in the release list immediately.
          # Refresh it by its stable ID after the initial lookup or creation.
          release_id="$(
            jq -er '.id | select(type == "number")' "$release_json"
          )"
          release_by_id "$release_id" > "$release_json"
          verify_release_tag
          if jq -e '.draft == true' "$release_json" >/dev/null; then
            release_is_owned_draft "$release_json"
            # Every release update must preserve the tag explicitly.
            jq -n \
              --arg tag "$RELEASE_TAG" \
              --arg target "$RELEASE_SHA" \
              --rawfile body release-handoff/release-notes.md \
              '{
                tag_name: $tag,
                target_commitish: $target,
                name: $tag,
                body: $body,
                draft: true,
                prerelease: false
              }' > release-handoff/update-release.json
            api --method PATCH \
              --input release-handoff/update-release.json \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              > "$release_json"
            for _attempt in 1 2 3 4 5; do
              release_by_id "$release_id" > "$release_json"
              if release_is_owned_draft "$release_json" \
                && release_metadata_matches "$release_json" \
                && release_tag_index_matches "$release_id"; then
                break
              fi
              sleep 2
            done
            release_is_owned_draft "$release_json"
            verify_release_metadata "$release_json"
            if ! release_tag_index_matches "$release_id"; then
              printf 'Release tag index did not converge for ID: %s\n' \
                "$release_id" >&2
              exit 1
            fi
          else
            jq -e \
              --arg tag "$RELEASE_TAG" \
              '.tag_name == $tag and
               .draft == false and
               .immutable == true' \
              "$release_json"
          fi

          jq -r '.assets[]?.name' "$release_json" \
            | sort > release-handoff/remote-assets.txt
          while IFS= read -r name; do
            grep -Fqx "$name" release-handoff/expected-assets.txt || {
              printf 'Unexpected remote release asset: %s\n' "$name" >&2
              exit 1
            }
            expected_digest="sha256:$(
              sha256sum "release-handoff/assets/${name}" \
                | cut -d ' ' -f 1
            )"
            actual_digest="$(
              jq -r --arg name "$name" \
                '[.assets[]? | select(.name == $name)] |
                 if length == 1 and .[0].state == "uploaded" then
                   .[0].digest // empty
                 else
                   empty
                 end' \
                "$release_json"
            )"
            if test "$actual_digest" = "$expected_digest"; then
              rm -rf release-handoff/remote-asset
              mkdir release-handoff/remote-asset
              gh release download "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --pattern "$name" \
                --dir release-handoff/remote-asset
              cmp \
                "release-handoff/assets/${name}" \
                "release-handoff/remote-asset/${name}"
              verify_github_asset_digest \
                "$release_json" \
                "$name" \
                "release-handoff/assets/${name}"
            elif jq -e \
              --arg name "$name" \
              '([.assets[]? | select(.name == $name)]) as $assets |
               .draft == true and
               .immutable == false and
               .author.login == "github-actions[bot]" and
               .author.id == 41898282 and
               .author.type == "Bot" and
               ($assets | length == 1) and
               $assets[0].uploader.login == "github-actions[bot]" and
               $assets[0].uploader.id == 41898282 and
               $assets[0].uploader.type == "Bot"' \
              "$release_json" >/dev/null; then
              printf 'Replacing stale draft asset: %s\n' "$name"
              gh release upload "$RELEASE_TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --clobber \
                "release-handoff/assets/${name}"
            else
              printf 'Release asset differs and is not replaceable: %s\n' \
                "$name" >&2
              exit 1
            fi
          done < release-handoff/remote-assets.txt

          if jq -e '.draft == true' "$release_json" >/dev/null; then
            while IFS= read -r name; do
              if ! grep -Fqx \
                "$name" release-handoff/remote-assets.txt; then
                gh release upload "$RELEASE_TAG" \
                  --repo "$GITHUB_REPOSITORY" \
                  "release-handoff/assets/${name}"
              fi
            done < release-handoff/expected-assets.txt

            for _attempt in 1 2 3 4 5; do
              release_by_id "$release_id" > "$release_json"
              jq -r '.assets[]?.name' "$release_json" \
                | sort > release-handoff/remote-assets.txt
              if release_is_owned_draft "$release_json" \
                && release_metadata_matches "$release_json" \
                && cmp --silent \
                release-handoff/expected-assets.txt \
                release-handoff/remote-assets.txt \
                && release_assets_match "$release_json"; then
                break
              fi
              sleep 2
            done
            release_is_owned_draft "$release_json"
            verify_release_metadata "$release_json"
            cmp \
              release-handoff/expected-assets.txt \
              release-handoff/remote-assets.txt
            release_assets_match "$release_json"

            while IFS= read -r name; do
              verify_github_asset_digest \
                "$release_json" \
                "$name" \
                "release-handoff/assets/${name}"
            done < release-handoff/expected-assets.txt

            verify_release_tag

            jq -n \
              --arg tag "$RELEASE_TAG" \
              --arg target "$RELEASE_SHA" \
              --rawfile body release-handoff/release-notes.md \
              '{
                tag_name: $tag,
                target_commitish: $target,
                name: $tag,
                body: $body,
                draft: false,
                prerelease: false
              }' \
              > release-handoff/publish-release.json
            api --method PATCH \
              --input release-handoff/publish-release.json \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              > "$release_json"
          fi

          for _attempt in 1 2 3 4 5; do
            release_by_id "$release_id" > "$release_json"
            jq -r '.assets[]?.name' "$release_json" \
              | sort > release-handoff/remote-assets.txt
            if release_metadata_matches "$release_json" \
              && cmp --silent \
                release-handoff/expected-assets.txt \
                release-handoff/remote-assets.txt \
              && release_assets_match "$release_json" \
              && jq -e \
              '.draft == false and .immutable == true' \
              "$release_json" >/dev/null; then
              break
            fi
            sleep 2
          done
          jq -e \
            '.draft == false and .immutable == true' \
            "$release_json"
          verify_release_metadata "$release_json"
          cmp \
            release-handoff/expected-assets.txt \
            release-handoff/remote-assets.txt
          release_assets_match "$release_json"

          rm -rf published-assets
          mkdir published-assets
          while IFS= read -r name; do
            gh release download "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$name" \
              --dir published-assets
            cmp \
              "release-handoff/assets/${name}" \
              "published-assets/${name}"
            verify_github_asset_digest \
              "$release_json" \
              "$name" \
              "published-assets/${name}"
          done < release-handoff/expected-assets.txt

      - name: Check out release metadata
        uses: actions/checkout@v6.0.3
        with:
          ref: releases
          path: release-metadata
          fetch-depth: 1
          persist-credentials: true

      - name: Update release metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          cd release-metadata
          mkdir -p manifests
          history="manifests/${RELEASE_TAG}.json"
          published="../published-assets/manifest.json"
          previous="../release-handoff/previous-manifest.json"

          if test -f "$history"; then
            cmp "$history" "$published"
            if test "$(jq -r '.tag' manifest.json)" \
              = "$RELEASE_TAG"; then
              cmp manifest.json "$published"
            fi
          else
            cmp manifest.json "$previous"
            cp "$published" "$history"
            cp "$published" manifest.json
          fi

          if test -n "$(git status --porcelain)"; then
            git config user.name "github-actions[bot]"
            git config user.email \
              "41898282+github-actions[bot]@users.noreply.github.com"
            git add manifest.json "$history"
            git commit -m "Record release ${RELEASE_TAG}"
            git push origin HEAD:releases
          fi
